spring:
  datasource:
    url: jdbc:h2:mem:sbg_marking_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  flyway:
    enabled: false

sbg:
  marking:
    reservation:
      ttl:
        seconds: 300
    cleanup:
      interval:
        ms: 60000
    history:
      max-size: 5000
