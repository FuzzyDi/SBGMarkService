server:
  port: 8080

spring:
  datasource:
    url: ${SBG_MARKING_DB_URL:jdbc:postgresql://localhost:5432/sbg_marking}
    username: ${SBG_MARKING_DB_USER:postgres}
    password: ${SBG_MARKING_DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: ${SBG_MARKING_FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${SBG_MARKING_FLYWAY_BASELINE_VERSION:0}

sbg:
  marking:
    reservation:
      ttl:
        seconds: 900
    cleanup:
      interval:
        ms: 60000
    history:
      max-size: 100000
    idempotency:
      retention:
        days: 30
    auth:
      enabled: ${SBG_MARKING_AUTH_ENABLED:false}
      admin-token: ${SBG_MARKING_AUTH_ADMIN_TOKEN:}
      operator-token: ${SBG_MARKING_AUTH_OPERATOR_TOKEN:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
