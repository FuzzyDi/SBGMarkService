name: SBG Marking CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test (contracts + server)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build and run tests
        run: mvn -B -V -ntp -pl sbg-marking-contracts,sbg-marking-server -am verify

  staging-smoke:
    name: Staging Smoke (docker-compose)
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare staging env file
        run: cp .env.staging.example .env

      - name: Start staging stack
        run: docker compose -f docker-compose.staging.yml up -d --build

      - name: Wait for health endpoint
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if curl -fsS "http://localhost:8080/actuator/health" | grep -q '"status":"UP"'; then
              echo "Service is UP."
              exit 0
            fi
            echo "Waiting for service to start... ($i/30)"
            sleep 2
          done
          echo "Service did not become healthy in time."
          exit 1

      - name: Import sample marks
        shell: bash
        run: |
          set -euo pipefail
          response=$(curl -fsS -X POST "http://localhost:8080/api/v1/km/import/full" \
            -H "Content-Type: application/json" \
            -d '{
              "batchId": "ci-smoke-batch",
              "items": [
                {
                  "markCode": "CI-KM-1001",
                  "item": "ITEM-1",
                  "gtin": "GTIN-1",
                  "productType": "TOBACCO",
                  "valid": true,
                  "blocked": false,
                  "status": "AVAILABLE",
                  "fifoTsEpochMs": 1000
                }
              ]
            }')
          echo "$response"
          echo "$response" | grep -q '"added":1'

      - name: Check reports endpoints
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS "http://localhost:8080/api/v1/reports/summary" | tee summary.json
          curl -fsS "http://localhost:8080/api/v1/reports/history?limit=5" | tee history.json
          grep -q '"importedMarks"' summary.json
          grep -q '"events"' history.json

      - name: Stop staging stack
        if: always()
        run: docker compose -f docker-compose.staging.yml down -v
