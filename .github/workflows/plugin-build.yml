name: SBG Set10 Plugin Build

on:
  push:
    branches:
      - main
    paths:
      - "sbg-set10-marking-plugin/**"
      - "sbg-marking-contracts/**"
      - "pom.xml"
      - ".github/workflows/plugin-build.yml"
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "sbg-set10-marking-plugin/**"
      - "sbg-marking-contracts/**"
      - "pom.xml"

jobs:
  build-plugin:
    name: Build Set10 Plugin (requires SET10 API jar secret)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Prepare Set10 API jar from secret
        id: set10-jar
        env:
          SET10_API_JAR_BASE64: ${{ secrets.SET10_API_JAR_BASE64 }}
        run: |
          if [ -z "$SET10_API_JAR_BASE64" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SET10_API_JAR_BASE64 is not configured. Plugin build is skipped."
            exit 0
          fi
          echo "available=true" >> "$GITHUB_OUTPUT"
          mkdir -p knowledge_base/set10/sources
          echo "$SET10_API_JAR_BASE64" | base64 -d > knowledge_base/set10/sources/set10pos-api-0.0.0_DO_NOT_CHANGE_VERSION-SNAPSHOT.jar

      - name: Build plugin
        if: steps.set10-jar.outputs.available == 'true'
        run: mvn -B -V -ntp -pl sbg-set10-marking-plugin -am -DskipTests package
